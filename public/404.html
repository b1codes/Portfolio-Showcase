<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Redirecting...</title>
    <script>
      // Store the path that led to the 404 error in sessionStorage
      sessionStorage.setItem('redirectPath', window.location.pathname);
      
      // Redirect back to the root of the application
      window.location.replace(window.location.origin + '/Portfolio/');
    </script>
  </head>
  <body>
    <p>If you are not redirected automatically, please <a href="/Portfolio/">click here to go to the homepage</a>.</p>
  </body>
</html>
